name: Arbor CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: native
    env:
      MIX_ENV: test
      ARBOR_COOKIE: ci_test_cookie_not_a_secret
      # This is the GATING lane and it is HERMETIC: it runs no LLM-backed tests,
      # so it needs no LLM provider (homelab Ollama / OpenRouter / anything). The
      # :llm / :llm_local / :integration_lm_studio tests run in the separate,
      # non-gating "LLM Tests" lane below. That's what lets the big inference box
      # stay off without reddening the merge gate.
      ARBOR_DB: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain (mise → .tool-versions)
        run: |
          mise install
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: mix-test-${{ hashFiles('.tool-versions', 'mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Setup test database
        run: mix ecto.create -r Arbor.Persistence.Repo && mix ecto.migrate -r Arbor.Persistence.Repo
        continue-on-error: true

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict
        continue-on-error: true

      - name: Sobelow (security)
        run: mix sobelow --config --root apps/arbor_dashboard && mix sobelow --config --root apps/arbor_gateway
        continue-on-error: true

      # Hermetic gating run. Plain `mix test` (NO --include) so the per-app
      # test_helper + these --exclude flags are authoritative — :integration and
      # :slow tests RUN (they're hermetic), while every backend/external/db tag is
      # excluded. Crucially, with no --include nothing overrides the excludes, so a
      # test tagged both :integration AND :llm is still skipped (ExUnit's --include
      # would otherwise re-include it). :database runs in its own lane; :llm et al.
      # run in the non-gating LLM lane.
      - name: Run test suite (hermetic — no LLM, no database)
        run: >-
          mix test
          --exclude llm --exclude llm_local --exclude integration_lm_studio
          --exclude external --exclude distributed --exclude database
          --timeout 120000

  # ── Database lane ───────────────────────────────────────────────────────────
  # Runs ONLY the :database-tagged tests against Postgres. These need the Repo
  # started + Sandbox isolation, which `Arbor.Persistence.DatabaseCase` provides.
  # Split out from the default lane so a DB issue can't redden the whole suite
  # (and vice-versa).
  database:
    name: Database Tests
    runs-on: native
    env:
      MIX_ENV: test
      ARBOR_COOKIE: ci_test_cookie_not_a_secret
      ARBOR_DB: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain (mise → .tool-versions)
        run: |
          mise install
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: mix-test-${{ hashFiles('.tool-versions', 'mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Setup test database
        run: mix ecto.create -r Arbor.Persistence.Repo && mix ecto.migrate -r Arbor.Persistence.Repo

      - name: Run database tests
        run: mix test --only database --timeout 120000

  # ── LLM lane (allowed to fail) ──────────────────────────────────────────────
  # Runs ONLY the LLM-backed tests (:llm / :llm_local / :integration_lm_studio)
  # against a real model backend. NON-GATING (continue-on-error) so it never
  # blocks a merge: when the inference box is up it reports real status; when
  # it's off (the common case — we don't keep the power-hungry GPU server
  # running for CI) it goes red without consequence. Repoint the backend by
  # changing ARBOR_OLLAMA_BASE_URL / ANTHROPIC_BASE_URL (homelab Ollama today;
  # a 3060 laptop or OpenRouter later). All settings are env-driven.
  llm:
    name: LLM Tests (non-gating)
    runs-on: native
    continue-on-error: true
    env:
      MIX_ENV: test
      ARBOR_COOKIE: ci_test_cookie_not_a_secret
      UNIFIED_LLM_DEFAULT_PROVIDER: ollama
      UNIFIED_LLM_DEFAULT_MODEL: "granite3.1-moe:1b"
      ARBOR_OLLAMA_BASE_URL: "http://10.42.42.100:11434"
      ANTHROPIC_BASE_URL: "http://10.42.42.100:11434"
      ANTHROPIC_AUTH_TOKEN: ollama
      ARBOR_ACP_ALTERNATE_MODEL: "granite3.1-moe:1b"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up toolchain (mise → .tool-versions)
        run: |
          mise install
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      # ClaudeTest drives the real `claude` CLI (pointed at the Ollama endpoint).
      - name: Install Claude CLI
        run: npm i -g @anthropic-ai/claude-code
        continue-on-error: true

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: mix-test-${{ hashFiles('.tool-versions', 'mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      # Warm the models the suite uses into VRAM so the first call doesn't eat a
      # cold-load against per-test timeouts. Best-effort.
      - name: Warm Ollama models
        run: |
          for m in "$UNIFIED_LLM_DEFAULT_MODEL" granite3.3:2b; do
            curl -sf -m 600 -X POST "$ARBOR_OLLAMA_BASE_URL/api/generate" \
              -d '{"model":"'"$m"'","prompt":"hi","stream":false,"keep_alive":"30m"}' \
              && echo "warmed $m" || echo "warmup skipped for $m (endpoint unavailable)"
          done
        continue-on-error: true

      - name: Run LLM tests
        run: mix test --only llm --include llm_local --include integration_lm_studio --timeout 600000

  # ── Experimental tracking lane (allowed to fail) ────────────────────────────
  # Does Arbor build & test on the NEXT Erlang/Elixir generation? This lane
  # reports its real status but never blocks the workflow (continue-on-error).
  # It exists so we can SEE when OTP-29 goes green — not to gate merges.
  #
  # Reality check (2026-05-29): OTP-29 has no stable Elixir yet. The only Elixir
  # built for OTP-29 is the 1.20.0-rc line (there is no 1.19.x-otp-29 build), so
  # this necessarily tracks the OTP-29 + Elixir-1.20-rc combo. Expected reds
  # until the frontier matures:
  #   - memento's `@type record` (deps/memento) collides with OTP-29
  #   - an Elixir-on-OTP-29 type-checker crash
  #   - Elixir 1.20 changes / pre-release version-match quirks
  # Bump OTP_VERSION / ELIXIR_VERSION as newer (eventually stable) builds ship.
  test-otp29:
    name: Test Suite (OTP-29 + Elixir 1.20-rc, experimental)
    runs-on: native
    continue-on-error: true
    env:
      MIX_ENV: test
      ARBOR_COOKIE: ci_test_cookie_not_a_secret
      OTP_VERSION: "29.0.1"
      ELIXIR_VERSION: "1.20.0-rc.6-otp-29"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache deps + build (separate key from the primary lane)
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: mix-otp29-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}

      # First run builds Erlang from source via mise; the native runner persists
      # the install, so subsequent runs are a no-op.
      - name: Install OTP-29 toolchain via mise
        run: mise install "erlang@${OTP_VERSION}" "elixir@${ELIXIR_VERSION}"

      - name: Install dependencies
        run: mise exec "erlang@${OTP_VERSION}" "elixir@${ELIXIR_VERSION}" -- mix deps.get

      # The known OTP-29 blockers (memento @type record, type-checker crash)
      # surface here. No --warnings-as-errors: we want to see how far it gets.
      - name: Compile
        run: mise exec "erlang@${OTP_VERSION}" "elixir@${ELIXIR_VERSION}" -- mix compile

      - name: Run hermetic test subset
        run: >-
          mise exec "erlang@${OTP_VERSION}" "elixir@${ELIXIR_VERSION}" --
          mix test --exclude llm --exclude llm_local --exclude external
          --exclude database --exclude distributed --timeout 120000
