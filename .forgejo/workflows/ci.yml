name: Arbor CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: native
    env:
      MIX_ENV: test
      ARBOR_COOKIE: ci_test_cookie_not_a_secret
      # Use free model for LLM tests in CI
      UNIFIED_LLM_DEFAULT_MODEL: "arcee-ai/trinity-large-preview:free"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: mix-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-test-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict
        continue-on-error: true

      - name: Run full test suite
        run: mix test --include llm --include integration --include slow --timeout 120000
