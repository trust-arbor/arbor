name: Arbor CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: native
    env:
      MIX_ENV: test
      ARBOR_COOKIE: ci_test_cookie_not_a_secret
      # LLM configuration for tests that make real API calls
      UNIFIED_LLM_DEFAULT_MODEL: "arcee-ai/trinity-large-preview:free"
      UNIFIED_LLM_DEFAULT_PROVIDER: openrouter
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # Enable Postgres for database tests
      ARBOR_DB: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build/test
          key: mix-test-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Setup test database
        run: mix ecto.create -r Arbor.Persistence.Repo && mix ecto.migrate -r Arbor.Persistence.Repo
        continue-on-error: true

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict
        continue-on-error: true

      - name: Sobelow (security)
        run: cd apps/arbor_dashboard && mix sobelow --config && cd ../arbor_gateway && mix sobelow --config
        continue-on-error: true

      - name: Run full test suite
        run: mix test --include llm --include integration --include slow --include database --include distributed --timeout 120000
