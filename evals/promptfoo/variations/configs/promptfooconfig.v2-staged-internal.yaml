# Standalone config for Variation 2: Staged Internal Thinking
prompts:
  - file://../../prompts/variations/v2-staged-internal.js

providers:
  - id: openai:chat:kimi-k2.6:cloud
    label: kimi-k2.6:cloud
    config:
      apiBaseUrl: http://localhost:11434/v1
      apiKey: ollama
      temperature: 0.0
      max_tokens: 32768  # high for quality exploration (Kimi/Nemotron)
      timeout: 300000   # 5 min for high-quality exploration (no artificial constraint)

  - id: openai:chat:glm-5.1:cloud
    label: glm-5.1:cloud
    config:
      apiBaseUrl: http://localhost:11434/v1
      apiKey: ollama
      temperature: 0.0
      max_tokens: 32768  # high for quality exploration (Kimi/Nemotron)
      timeout: 120000

  - id: openai:chat:minimax-m2.7:cloud
    label: minimax-m2.7:cloud
    config:
      apiBaseUrl: http://localhost:11434/v1
      apiKey: ollama
      temperature: 0.0
      max_tokens: 32768  # high for quality exploration (Kimi/Nemotron)
      timeout: 120000

  - id: openai:chat:nemotron-3-super:cloud
    label: nemotron-3-super:cloud
    config:
      apiBaseUrl: http://localhost:11434/v1
      apiKey: ollama
      temperature: 0.0
      max_tokens: 32768  # high for quality exploration (Kimi/Nemotron)
      timeout: 300000   # 5 min for high-quality exploration (no artificial constraint)

  - id: openai:chat:deepseek-v4-pro:cloud
    label: deepseek-v4-pro:cloud
    config:
      apiBaseUrl: http://localhost:11434/v1
      apiKey: ollama
      temperature: 0.0
      max_tokens: 32768  # high for quality exploration (Kimi/Nemotron)
      timeout: 120000

  - id: openai:chat:deepseek-v4-flash:cloud
    label: deepseek-v4-flash:cloud
    config:
      apiBaseUrl: http://localhost:11434/v1
      apiKey: ollama
      temperature: 0.0
      max_tokens: 32768  # high for quality exploration (Kimi/Nemotron)
      timeout: 120000

tests: file://../../tests/skill-to-dot-tests.yaml

defaultTest:
  options:
    temperature: 0
  assert:
    # Hard requirement: the output must be valid executable DOT for the Arbor engine.
    # This stays as a gate even while we focus scoring on translation quality.
    - type: javascript
      value: file://../../assertions/extract-dot.js
    - type: javascript
      value: file://../../assertions/validate-with-arbor.js

    # Primary scoring signal: how accurately the model translated the SKILL.md
    # into a state machine (nodes = states/phases with encoded responsibilities,
    # edges = control flow and transitions). This is the focus for the current
    # round of prompt comparison.
    - type: llm-rubric
      weight: 5
      value: |
        You are evaluating how accurately a model has translated the content of a SKILL.md file into a state machine expressed as a DOT graph.

        The SKILL.md contains the natural-language description of the skill's intent, behaviors, decisions, constraints, knowledge, and logical flow. The DOT graph is a state machine in which nodes represent states or phases (with prompts encoding the work to be done in that state) and edges represent transitions and control flow.

        Judge only the quality of this translation:

        - Completeness of mapping: Are all the important activities, decision points, guidance, constraints, and pieces of knowledge from the SKILL.md represented somewhere in the graph (as node responsibilities or flow structure)?
        - Accuracy of encoding: Do the node prompts and the overall topology faithfully reflect the skill's described logic without major omissions, distortions, or additions that change the meaning?
        - State machine fidelity: Does the resulting graph function as a coherent, executable state machine that captures what it means to perform this skill?

        Do not score on:
        - Optimal node granularity or handler selection (we will tune structural concerns separately and can automate much of this later).
        - Robustness features or error handling (unless the SKILL.md itself explicitly describes them).
        - Whether an autonomous agent would ultimately prefer this graph over the raw SKILL.md.

        Score 0.0–1.0 strictly on translation accuracy from the SKILL.md into state-machine form. Output only the numeric score followed by 2-4 bullets on the largest translation gaps or successes.
