# Cloud / hosted model providers for baseline comparison on SKILL.md → DOT quality.
#
# These are useful to understand the "ceiling" for this task and to decide
# whether the current CompilationPrompt needs tuning.
#
# Usage example:
#   export KIMI_API_KEY=sk-...
#   export GLM_API_KEY=...
#   npx promptfoo eval -c promptfooconfig.yaml --providers providers.cloud.yaml --no-cache -j 2
#
# Most of these use OpenAI-compatible endpoints. Promptfoo's `openai` provider
# works well for them.

# --- Moonshot Kimi (K2 series, very strong at following strict output formats) ---
- id: openai:chat:kimi-k2.6
  label: Kimi-K2.6 (cloud)
  config:
    apiBaseUrl: https://api.moonshot.cn/v1
    apiKey: ${KIMI_API_KEY}
    temperature: 0.0
    max_tokens: 8192
    timeout: 120000

# --- Zhipu AI GLM-5.1 / GLM-4 series ---
- id: openai:chat:glm-5.1
  label: GLM-5.1 (cloud)
  config:
    apiBaseUrl: https://open.bigmodel.cn/api/paas/v4
    apiKey: ${GLM_API_KEY}
    temperature: 0.0
    max_tokens: 8192
    timeout: 120000

# --- Minimax (latest large models) ---
- id: openai:chat:minimax-2.7
  label: Minimax-2.7 (cloud)
  config:
    apiBaseUrl: https://api.minimax.chat/v1
    apiKey: ${MINIMAX_API_KEY}
    temperature: 0.0
    max_tokens: 8192
    timeout: 120000

# --- NVIDIA Nemotron 3 Super (hosted / NIM or compatible endpoint) ---
# Note: Exact base URL depends on where you access it (NVIDIA hosted, Fireworks, Together, etc.)
- id: openai:chat:nemotron-3-super
  label: Nemotron-3-Super (cloud)
  config:
    apiBaseUrl: https://integrate.api.nvidia.com/v1   # common NVIDIA endpoint
    apiKey: ${NVIDIA_API_KEY}
    temperature: 0.0
    max_tokens: 8192
    timeout: 180000

